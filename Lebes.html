<h1 align="center">ルベーグ積分入門</h1>

<p>
このサイトではルベーグ積分の基礎について解説します。
</p>

<h2>ルベーグ積分とは</h2>

<p>
リーマン積分では扱いにくい関数を積分するために
ルベーグ積分が導入されます。
</p>

<div class="theorem">
<b>定理（単調収束定理）</b>

<p>
$f_n \uparrow f$ のとき
</p>

\[
\lim_{n\to\infty}
\int f_n\,d\mu
=
\int f\,d\mu
\]

<p>
が成り立ちます。
</p>
